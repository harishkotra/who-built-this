<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Who Built This? — Reputation Graph Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0b;
    --surface: #141416;
    --surface2: #1c1c1f;
    --border: #27272a;
    --text: #fafafa;
    --text-secondary: #a1a1aa;
    --text-tertiary: #71717a;
    --accent: #3b82f6;
    --accent-hover: #60a5fa;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,.1);
    --orange: #f59e0b;
    --orange-bg: rgba(245,158,11,.1);
    --radius: 8px;
    --radius-lg: 12px;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--bg); color: var(--text);
    -webkit-font-smoothing: antialiased;
    overflow: hidden; height: 100vh;
  }

  .app { display: flex; flex-direction: column; height: 100vh; }

  /* Header */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    flex-shrink: 0; gap: 12px;
  }
  .topbar .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
  .topbar .logo svg { flex-shrink: 0; }
  .topbar .logo h1 { font-size: 15px; font-weight: 600; color: var(--text); }
  .topbar .logo span { color: var(--text-secondary); font-weight: 400; }

  .topbar .center { flex: 1; display: flex; align-items: center; gap: 16px; justify-content: center; }
  .topbar .stats { display: flex; gap: 16px; }
  .topbar .stats span { font-size: 12px; color: var(--text-tertiary); }
  .topbar .stats strong { color: var(--text); font-weight: 600; }

  .topbar .right { display: flex; align-items: center; gap: 12px; }
  .topbar .badge { font-size: 11px; color: var(--text-tertiary); background: var(--surface2); padding: 3px 9px; border-radius: 20px; border: 1px solid var(--border); }
  .topbar .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .topbar .dot.live { background: var(--green); }
  .topbar .dot.lag { background: var(--orange); }

  .topbar .icon-btn {
    background: none; border: 1px solid var(--border); border-radius: var(--radius);
    padding: 5px 10px; color: var(--text-secondary); cursor: pointer;
    font-family: var(--font); font-size: 11px; transition: border-color .15s;
  }
  .topbar .icon-btn:hover { border-color: var(--accent); color: var(--text); }
  .topbar .icon-btn.active { border-color: var(--accent); color: var(--accent); }

  /* Search bar */
  .searchbar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 20px; border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .searchbar input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 7px 12px; color: var(--text);
    font-family: var(--font); font-size: 13px; outline: none;
    transition: border-color .15s; max-width: 400px;
  }
  .searchbar input:focus { border-color: var(--accent); }
  .searchbar input::placeholder { color: var(--text-tertiary); }
  .searchbar .hint { font-size: 11px; color: var(--text-tertiary); }

  /* Main area */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Graph canvas */
  .graph-area { flex: 1; position: relative; }
  .graph-area canvas { display: block; width: 100%; height: 100%; }
  .graph-area .overlay {
    position: absolute; top: 12px; left: 12px;
    font-size: 11px; color: var(--text-tertiary);
    pointer-events: none; user-select: none;
  }

  /* Side panel */
  .side {
    width: 340px; border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
    flex-shrink: 0;
  }
  .side-header {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    font-size: 12px; font-weight: 600; color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: .5px;
  }
  .side-body { flex: 1; overflow-y: auto; }

  .side .empty-state {
    text-align: center; padding: 40px 20px; color: var(--text-tertiary); font-size: 12px; line-height: 1.6;
  }

  /* List items in side panel */
  .list-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 16px; cursor: pointer;
    transition: background .1s; border-bottom: 1px solid var(--border);
  }
  .list-item:last-child { border-bottom: none; }
  .list-item:hover { background: var(--surface2); }
  .list-item .emoji { font-size: 14px; width: 20px; text-align: center; flex-shrink: 0; }
  .list-item .info { flex: 1; min-width: 0; }
  .list-item .info .name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-item .info .meta { font-family: var(--mono); font-size: 10px; color: var(--text-tertiary); margin-top: 1px; }
  .list-item .tag { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: var(--surface2); color: var(--text-secondary); flex-shrink: 0; }

  /* Triple row in side panel */
  .triple-row {
    display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
    padding: 7px 16px; border-bottom: 1px solid var(--border); font-size: 12px;
    cursor: pointer; transition: background .1s;
  }
  .triple-row:last-child { border-bottom: none; }
  .triple-row:hover { background: var(--surface2); }
  .triple-row .term { color: var(--accent); font-weight: 500; cursor: pointer; }
  .triple-row .term:hover { text-decoration: underline; }
  .triple-row .arrow { color: var(--text-tertiary); font-size: 12px; }
  .triple-row .pred { color: var(--green); font-size: 10px; background: var(--green-bg); padding: 1px 5px; border-radius: 3px; font-weight: 500; }

  /* Detail panel */
  .detail-panel { padding: 16px; }
  .detail-panel .back {
    background: none; border: 1px solid var(--border); border-radius: var(--radius);
    padding: 4px 10px; color: var(--text-secondary); cursor: pointer;
    font-family: var(--font); font-size: 11px; margin-bottom: 12px;
  }
  .detail-panel .back:hover { border-color: var(--accent); color: var(--text); }
  .detail-panel h2 { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
  .detail-panel .meta { font-family: var(--mono); font-size: 10px; color: var(--text-tertiary); word-break: break-all; margin-bottom: 12px; }
  .detail-panel .triple-row { padding: 7px 0; }

  .graph-tooltip {
    position: absolute; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px 12px; font-size: 12px;
    pointer-events: none; display: none; z-index: 10;
    max-width: 250px;
  }
  .graph-tooltip .tt-name { font-weight: 600; }
  .graph-tooltip .tt-id { font-family: var(--mono); font-size: 10px; color: var(--text-tertiary); }

  .legend {
    position: absolute; bottom: 12px; left: 12px;
    display: flex; gap: 12px; font-size: 10px; color: var(--text-tertiary);
    pointer-events: none; user-select: none;
  }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .legend .swatch { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  @media (max-width: 720px) {
    .side { width: 260px; }
    .topbar { flex-wrap: wrap; }
    .topbar .center { order: 3; width: 100%; }
  }
</style>
</head>

<div class="app">

</div>

<script>

// Fallback on-chain data from tx receipts (indexer is stuck)
const FALLBACK_DATA = {"atoms":[{"term_id":"0xa4ecbecb9f9cc868ab349f370ab85f86c0a2f4c68cad90e031599bf03937cb20","label":"contributedTo"},{"term_id":"0xcb7feefa0414c4379888d38daedf01635f4e1ea56417d0edb501278fcc2134d0","label":"authored"},{"term_id":"0x127880cc7cf6361e97ed9d629eced6ab06d2b05b5c18dba93953c53ac1eb007e","label":"mergedBy"},{"term_id":"0xdd0dd7eed5efa7ee0addd61ba992299d7ff3f983b9311bb0cd87953e2e5fa7ab","label":"hasPackage"},{"term_id":"0x840dece2a0bc379d7c6e2955e41bfa60d8dacd050aa2855b93ab497f6393f5eb","label":"maintainedBy"},{"term_id":"0xdc5a9ea0e1921ebbe8044f76429dc01a772223a07b3733dea08565b2852affde","label":"worksAt"},{"term_id":"0xafabe795d861cdc5964234678cfbd86a7bd834e863281f7a3d202091286ae20e","label":"harishkotra"},{"term_id":"0x524d4c4c6543598a2bcb9e266d6537270c409af8d656fb0100585a959e36b3f0","label":"agent-office"},{"term_id":"0xa79de8e200cafc13fa88246f7523a9c4ef1d5128d301a3713d889d288bb56281","label":"agent-office (npm)"},{"term_id":"0xdfe53a977438a652072e1766d0352ad6c7fcd125af4478f3b60ad58e1fd5d982","label":"harishkotra (org)"},{"term_id":"0x9a3cd8ac2178ebfa18659c8d79b9ac2ebd1d7d5a5d7aab99f460ca8fcf6f2f59","label":"PR #1: sendExistingAgents fires before webview ready"},{"term_id":"0x4a72adfade024de93cd457379fed0229e6b62ca0c87675371089d1112e24587e","label":"ISSUE: adoptTerminalForFile doesn't add file to knownJsonl"},{"term_id":"0x2d7082d0c051f7adc4cc2a185ce5480a63d8fa75840c42e94aff8ad447cfe65e","label":"ISSUE: removeAgent doesn't remove file from knownJsonlFiles"},{"term_id":"0x5384cfaf2f7c9dfb4e35ab66881b5db1edfd662762a144a34be83039ff21ff83","label":"ISSUE: reassignAgentToFile doesn't add file to knownJsonl"},{"term_id":"0x4f6f50796d4e482053aab9dd1b46349db2392fa7768ac02785b62bd1baf42994","label":"ISSUE: markOwnWrite race condition skips legitimate writes"},{"term_id":"0xb6664453ac98141627804a7367aa80fdf0b40e9d36e60a7dcc194a10cf2e0559","label":"PR: properly track knownJsonlFiles on reassign and remove"},{"term_id":"0x8840ef02aa53c9e984e41694d 94aff8ad447cfe65e"},{"subject_id":"0xafabe795d861cdc5964234678cfbd86a7bd834e863281f7a3d202091286ae20e","predicate_id":"0xcb7feefa0414c4379888d38daedf01635f4e1ea56417d0edb501278fcc2134d0","object_id":"0x5384cfaf2f7c9dfb4e35ab66881b5db1edfd662762a144a34be83039ff21ff83"},{"subject_id":"0xafabe795d861cdc5964234678cfbd86a7bd834e863281f7a3d202091286ae20e","predicate_id":"0xcb7feefa0414c4379888d38daedf01635f4e1ea56417d0edb501278fcc2134d0","object_id":"0x4f6f50796d4e482053aab9dd1b46349db2392fa7768ac02785b62bd1baf42994"},{"subject_id":"0xafabe795d861cdc5964234678cfbd86a7bd834e863281f7a3d202091286ae20e","predicate_id":"0xcb7feefa0414c4379888d38daedf01635f4e1ea56417d0edb501278fcc2134d0","object_id":"0xb6664453ac98141627804a7367aa80fdf0b40e9d36e60a7dcc194a10cf2e0559"},{"subject_id":"0xafabe795d861cdc5964234678cfbd86a7bd834e863281f7a3d202091286ae20e","predicate_id":"0xcb7feefa0414c4379888d38daedf01635f4e1ea56417d0edb501278fcc2134d0","object_id":"0x8840ef02aa53c9e984e41694d572dce7c039c2f5e6f4f1a1d93242938658a9c6"},{"subject_id":"0xafabe795d861cdc5964234678cfbd86a7bd834e863281f7a3d202091286ae20e","predicate_id":"0xcb7feefa0414c4379888d38daedf01635f4e1ea56417d0edb501278fcc2134d0","object_id":"0xbad058f7dffed11858e3d89135372c52132b61d165acde25ea1b5d04365ecc83"}]}

const FALLBACK_PREDICATES = {
  '0xa4ecbecb9f9cc868ab349f370ab85f86c0a2f4c68cad90e031599bf03937cb20': 'contributedTo',
  '0xcb7feefa0414c4379888d38daedf01635f4e1ea56417d0edb501278fcc2134d0': 'authored',
  '0x127880cc7cf6361e97ed9d629eced6ab06d2b05b5c18dba93953c53ac1eb007e': 'mergedBy',
  '0xdd0dd7eed5efa7ee0addd61ba992299d7ff3f983b9311bb0cd87953e2e5fa7ab': 'hasPackage',
  '0x840dece2a0bc379d7c6e2955e41bfa60d8dacd050aa2855b93ab497f6393f5eb': 'maintainedBy',
  '0xdc5a9ea0e1921ebbe8044f76429dc01a772223a07b3733dea08565b2852affde': 'worksAt',
}

function inferAtomType(label) {
  if (label.startsWith('PR') || label.startsWith('ISSUE') || label.startsWith('Release') || label.startsWith('fix:') || label.startsWith('MEDIUM') || label.startsWith('HIGH') || label.startsWith('CRITICAL')) return 'article'
  if (label.includes('(org)') || label === 'harishkotra') return 'person'
  if (label.includes('(npm)')) return 'software-application'
  if (label === 'agent-office') return 'software'
  if (Object.values(FALLBACK_PREDICATES).includes(label)) return 'defined-term'
  return 'default'
}

function inferAtomEmoji(label) {
  if (label.startsWith('PR') || label.startsWith('fix:') || label.startsWith('Release')) return '\u{1F504}'
  if (label.startsWith('ISSUE') || label.startsWith('MEDIUM') || label.startsWith('HIGH') || label.startsWith('CRITICAL')) return '\u{26A0}\u{FE0F}'
  if (label.includes('(org)')) return '\u{1F3E2}'
  if (label === 'harishkotra') return '\u{1F464}'
  if (label.includes('(npm)')) return '\u{1F4E6}'
  if (label === 'agent-office') return '\u{1F4C1}'
  if (Object.values(FALLBACK_PREDICATES).includes(label)) return '\u{1F517}'
  return ''
}

let atoms = []
let triples = []
let graphView = true
let usingFallback = false

function q(query) {
  return fetch(API, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ query }),
  }).then(r => r.json()).then(d => { if (d.errors) throw new Error(d.errors[0].message); return d.data })
}

function esc(s) { const e = document.createElement('div'); e.textContent = s; return e.innerHTML }
function short(id) { if (!id || id.length < 16) return id || ''; return id.slice(0, 8) + '...' + id.slice(-6) }

/* ─── Force-directed graph ─── */
const canvas = document.getElementById('graphCanvas')
const ctx = canvas.getContext('2d')
const tooltip = document.getElementById('tooltip')

let nodes = []
let edges = []
let animId = null
let dragNode = null
let dragOffX = 0, dragOffY = 0
let hoveredNode = null
let graphReady = false

const COLORS = {
  person: '#3b82f6',
  software: '#8b5cf6',
  'software-application': '#f59e0b',
  article: '#06b6d4',
  company: '#ec4899',
  'defined-term': '#22c55e',
  default: '#6b7280',
}

function typeColor(type) { return COLORS[type] || COLORS.default }

function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect()
  canvas.width = rect.width * devicePixelRatio
  canvas.height = rect.height * devicePixelRatio
  canvas.style.width = rect.width + 'px'
  canvas.style.height = rect.height + 'px'
  ctx.scale(devicePixelRatio, devicePixelRatio)
}

function buildGraph() {
  const W = canvas.width / devicePixelRatio || 800
  const H = canvas.height / devicePixelRatio || 600
  const cx = W / 2, cy = H / 2
  const r = Math.min(W, H) * 0.32

  nodes = atoms.map(a => ({
    id: a.term_id, label: a.label, type: a.type, emoji: a.emoji || '',
    x: cx + (Math.random() - 0.5) * r * 1.5, y: cy + (Math.random() - 0.5) * r * 1.5,
    vx: 0, vy: 0, radius: a.type === 'defined-term' ? 14 : 18,
  }))
  const nodeMap = {}
  nodes.forEach(n => nodeMap[n.id] = n)

  edges = []
  triples.forEach(t => {
    const s = nodeMap[t.subject_id] || nodeMap[t.subject?.term_id]
    const o = nodeMap[t.object_id] || nodeMap[t.object?.term_id]
    const predId = t.predicate_id || t.predicate?.term_id
    const predLabel = t.predicate?.label || FALLBACK_PREDICATES[predId] || ''
    if (s && o) edges.push({ source: s, target: o, label: predLabel, predicate_id: predId })
  })

  graphReady = nodes.length > 0
}

function simulate() {
  const W = canvas.width / devicePixelRatio
  const H = canvas.height / devicePixelRatio
  const cx = W / 2, cy = H / 2
  const reps = 0.18, spring = 0.006, damp = 0.85, gravity = 0.001
  const ideal = 180

  for (let i = 0; i < nodes.length; i++) {
    const a = nodes[i]
    // repulsion
    for (let j = i + 1; j < nodes.length; j++) {
      const b = nodes[j]
      let dx = b.x - a.x, dy = b.y - a.y
      let d = Math.sqrt(dx * dx + dy * dy) || 1
      let force = reps / (d * d)
      a.vx -= (dx / d) * force
      a.vy -= (dy / d) * force
      b.vx += (dx / d) * force
      b.vy += (dy / d) * force
    }
    // gravity to center
    a.vx += (cx - a.x) * gravity
    a.vy += (cy - a.y) * gravity
  }

  for (const e of edges) {
    const dx = e.target.x - e.source.x, dy = e.target.y - e.source.y
    const d = Math.sqrt(dx * dx + dy * dy) || 1
    const disp = d - ideal
    const force = disp * spring
    e.source.vx += (dx / d) * force
    e.source.vy += (dy / d) * force
    e.target.vx -= (dx / d) * force
    e.target.vy -= (dy / d) * force
  }

  for (const n of nodes) {
    n.vx *= damp; n.vy *= damp
    n.x += n.vx; n.y += n.vy
    n.x = Math.max(30, Math.min(W - 30, n.x))
    n.y = Math.max(30, Math.min(H - 30, n.y))
  }
}

function draw() {
  const W = canvas.width / devicePixelRatio
  const H = canvas.height / devicePixelRatio
  ctx.clearRect(0, 0, W, H)

  if (!graphReady) {
    ctx.fillStyle = '#71717a'
    ctx.font = '14px Inter, sans-serif'
    ctx.textAlign = 'center'
    ctx.fillText('No graph data — waiting for indexer', W / 2, H / 2)
    return
  }

  // edges
  for (const e of edges) {
    ctx.beginPath()
    ctx.moveTo(e.source.x, e.source.y)
    ctx.lineTo(e.target.x, e.target.y)
    ctx.strokeStyle = hoveredNode && (e.source === hoveredNode || e.target === hoveredNode)
      ? 'rgba(255,255,255,0.25)' : 'rgba(255,255,255,0.08)'
    ctx.lineWidth = hoveredNode && (e.source === hoveredNode || e.target === hoveredNode) ? 2 : 1
    ctx.stroke()
  }

  // nodes
  for (const n of nodes) {
    const r = n === hoveredNode ? n.radius + 4 : n.radius
    ctx.beginPath()
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2)
    ctx.fillStyle = typeColor(n.type)
    ctx.globalAlpha = hoveredNode && n !== hoveredNode ? 0.3 : 0.9
    ctx.fill()
    ctx.globalAlpha = 1
    ctx.strokeStyle = n === hoveredNode ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.3)'
    ctx.lineWidth = 2
    ctx.stroke()
  }

  // labels
  ctx.fillStyle = '#e4e6f0'
  ctx.font = '11px Inter, sans-serif'
  ctx.textAlign = 'center'
  for (const n of nodes) {
    if (!hoveredNode || n === hoveredNode || edges.some(e => (e.source === hoveredNode && e.target === n) || (e.target === hoveredNode && e.source === n))) {
      ctx.fillStyle = n === hoveredNode ? '#fff' : 'rgba(228,230,240,0.7)'
      ctx.fillText(n.label.length > 20 ? n.label.slice(0, 18) + '..' : n.label, n.x, n.y + n.radius + 14)
    }
  }
}

function tick() {
  if (graphReady) {
    simulate()
    draw()
  }
  animId = requestAnimationFrame(tick)
}

/* ─── Mouse interaction ─── */
function getNodeAt(mx, my) {
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i]
    const dx = mx - n.x, dy = my - n.y
    if (dx * dx + dy * dy < (n.radius + 8) * (n.radius + 8)) return n
  }
  return null
}

canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect()
  const mx = e.clientX - rect.left, my = e.clientY - rect.top
  const n = getNodeAt(mx, my)
  if (n) { dragNode = n; dragOffX = mx - n.x; dragOffY = my - n.y; n.vx = 0; n.vy = 0 }
})
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect()
  const mx = e.clientX - rect.left, my = e.clientY - rect.top
  if (dragNode) {
    dragNode.x = mx - dragOffX; dragNode.y = my - dragOffY
    return
  }
  const n = getNodeAt(mx, my)
  hoveredNode = n
  canvas.style.cursor = n ? 'pointer' : 'default'
  if (n) {
    tooltip.style.display = 'block'
    tooltip.style.left = (e.clientX - canvas.parentElement.getBoundingClientRect().left + 12) + 'px'
    tooltip.style.top = (e.clientY - canvas.parentElement.getBoundingClientRect().top - 10) + 'px'
    tooltip.innerHTML = `<div class="tt-name">${esc(n.emoji)} ${esc(n.label)}</div><div class="tt-id">${esc(short(n.id))}</div><div style="font-size:10px;color:var(--text-tertiary);margin-top:2px">${esc(n.type)}</div>`
  } else {
    tooltip.style.display = 'none'
  }
})
canvas.addEventListener('mouseup', e => {
  if (dragNode) {
    const rect = canvas.getBoundingClientRect()
    const mx = e.clientX - rect.left, my = e.clientY - rect.top
    const n = getNodeAt(mx, my)
    if (n && n === dragNode) {
      showDetail(n.id)
    }
    dragNode = null
  }
})
canvas.addEventListener('mouseleave', () => { hoveredNode = null; tooltip.style.display = 'none'; dragNode = null })

function resolveAtomLabel(id) {
  const a = atoms.find(x => x.term_id === id)
  return a ? a.label : short(id)
}

function resolvePredLabel(id) {
  return FALLBACK_PREDICATES[id] || short(id)
}

/* ─── Side panel ─── */
function renderSide() {
  const body = document.getElementById('sideBody')
  if (!atoms.length && !triples.length) {
    const lagEl = document.getElementById('indexerLag')
    const idxBlock = lagEl.textContent.match(/block ([\d,]+)/)
    const idxBlockNum = idxBlock ? parseInt(idxBlock[1].replace(/,/g,'')) : 0
    const ourBlock = 9357153
    const behind = idxBlockNum > 0 ? Math.max(0, ourBlock - idxBlockNum) : '?'
    body.innerHTML = `<div class="empty-state">
      <strong style="color:var(--accent)">Data is on-chain but indexer is behind</strong><br><br>
      Our transactions were confirmed at block <strong>${ourBlock}</strong>.<br>
      The testnet GraphQL indexer has only indexed to block <strong>${idxBlockNum || '?'}</strong>.<br>
      Gap: <strong>${behind} blocks</strong> &mdash; this is an Intuition testnet infrastructure issue.<br><br>
      Verify on-chain:<br>
      <a href="https://testnet.explorer.intuition.systems/tx/0x162792250a34aceab00a407e82202bd6f20c88a61c1bc877d5b3b09a1821b2a7" target="_blank" style="color:var(--accent);font-size:11px">Tx 1: 6 predicate atoms &nearr;</a><br>
      <a href="https://testnet.explorer.intuition.systems/tx/0x99e83a9d182cbaa42e8e3698f8910c4c3de0292a2b20933cbd34dae01b234812" target="_blank" style="color:var(--accent);font-size:11px">Tx 2: 12 triples &nearr;</a>
    </div>`
    return
  }

  let html = '<div class="side-header">Atoms</div>'
  for (const a of atoms) {
    html += `<div class="list-item" onclick="showDetail('${esc(a.term_id)}')">
      <span class="emoji">${esc(a.emoji || '') || '&#9672;'}</span>
      <div class="info"><div class="name">${esc(a.label)}</div><div class="meta">${short(a.term_id)}</div></div>
      <span class="tag">${esc(a.type)}</span>
    </div>`
  }

  html += '<div class="side-header" style="margin-top:8px">Triples</div>'
  for (const t of triples) {
    const s = t.subject ? t.subject : { term_id: t.subject_id }
    const p = t.predicate ? t.predicate : { term_id: t.predicate_id, label: resolvePredLabel(t.predicate_id) }
    const o = t.object ? t.object : { term_id: t.object_id }
    html += `<div class="triple-row">
      <span class="term" onclick="event.stopPropagation();showDetail('${esc(s.term_id)}')">${esc(resolveAtomLabel(s.term_id))}</span>
      <span class="arrow">&rarr;</span>
      <span class="pred">${esc(p.label || resolvePredLabel(p.term_id))}</span>
      <span class="arrow">&rarr;</span>
      <span class="term" onclick="event.stopPropagation();showDetail('${esc(o.term_id)}')">${esc(resolveAtomLabel(o.term_id))}</span>
    </div>`
  }

  body.innerHTML = html
}

function showDetail(termId) {
  const a = atoms.find(x => x.term_id === termId)
  if (!a) return
  const body = document.getElementById('sideBody')
  const relTriples = triples.filter(t =>
    t.subject_id === termId || t.object_id === termId || t.predicate_id === termId ||
    t.subject?.term_id === termId || t.object?.term_id === termId || t.predicate?.term_id === termId
  )
  const emoji = inferAtomEmoji(a.label)
  body.innerHTML = `
    <div class="detail-panel">
      <button class="back" onclick="renderSide();document.getElementById('graphOverlay').textContent='&#9670; Reputation Graph'">&#8592; Back</button>
      <h2>${emoji ? emoji + ' ' : ''}${esc(a.label)}</h2>
      <div class="meta">${esc(a.term_id)}</div>
      <div style="font-size:11px;color:var(--text-secondary);margin-bottom:12px">Type: ${esc(a.type)}</div>
      <div style="font-size:12px;font-weight:600;color:var(--text-tertiary);margin-bottom:6px">RELATIONS (${relTriples.length})</div>
      ${relTriples.length ? relTriples.map(t => {
        const si = t.subject_id || t.subject?.term_id
        const pi = t.predicate_id || t.predicate?.term_id
        const oi = t.object_id || t.object?.term_id
        const sl = t.subject?.label || resolveAtomLabel(si)
        const pl = t.predicate?.label || resolvePredLabel(pi)
        const ol = t.object?.label || resolveAtomLabel(oi)
        return `<div class="triple-row"><span class="term" onclick="event.stopPropagation();showDetail('${esc(si)}')">${esc(sl)}</span> <span class="arrow">&rarr;</span> <span class="pred">${esc(pl)}</span> <span class="arrow">&rarr;</span> <span class="term" onclick="event.stopPropagation();showDetail('${esc(oi)}')">${esc(ol)}</span></div>`
      }).join('') : '<div style="font-size:11px;color:var(--text-tertiary);padding:8px 0">No relations</div>'}
    </div>
  `
  document.getElementById('graphOverlay').textContent = '▪ ' + a.label
}

/* ─── View toggle ─── */
function toggleView() {
  graphView = !graphView
  document.getElementById('viewToggle').textContent = graphView ? 'List' : 'Graph'
  document.querySelector('.graph-area').style.display = graphView ? 'block' : 'none'
  if (!graphView) renderSide()
}

/* ─── Load ─── */
async function load() {
  try {
    const globalInfo = await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query: '{ atoms(limit: 1, order_by: { block_number: desc }) { block_number created_at } triples(limit: 1, order_by: { block_number: desc }) { block_number created_at } atoms_aggregate { aggregate { count } } triples_aggregate { aggregate { count } } }' }) }).then(r => r.json()).then(d => d.data).catch(() => null)

    const f = `creator_id: { _eq: "${CREATOR}" }`
    let [myAtoms, myTriples, counts] = [{ atoms: [] }, { triples: [] }, null]
    try {
      ;[myAtoms, myTriples, counts] = await Promise.all([
        q(`{ atoms(limit: 100, where: { ${f} }, order_by: { created_at: desc }) { term_id label type emoji creator_id } }`),
        q(`{ triples(limit: 200, where: { ${f} }, order_by: { created_at: desc }) { term_id subject { term_id label } predicate { term_id label } object { term_id label } } }`),
        q(`{ atoms_aggregate(where: { ${f} }) { aggregate { count } } triples_aggregate(where: { ${f} }) { aggregate { count } } }`),
      ])
    } catch (e) {}

    atoms = myAtoms.atoms || []
    triples = (myTriples.triples || []).map(t => ({
      ...t,
      subject_id: t.subject?.term_id,
      predicate_id: t.predicate?.term_id,
      object_id: t.object?.term_id,
    }))
    const ac = counts?.atoms_aggregate?.aggregate?.count ?? 0
    const tc = counts?.triples_aggregate?.aggregate?.count ?? 0

    usingFallback = ac === 0 && tc === 0 && FALLBACK_DATA.atoms.length > 0
    if (usingFallback) {
      atoms = FALLBACK_DATA.atoms.map(a => ({
        ...a,
        type: inferAtomType(a.label),
        emoji: inferAtomEmoji(a.label),
      }))
      triples = FALLBACK_DATA.triples.map(t => ({
        subject_id: t.subject_id,
        predicate_id: t.predicate_id,
        object_id: t.object_id,
      }))
    }

    document.getElementById('atomCount').textContent = usingFallback ? atoms.length : ac
    document.getElementById('tripleCount').textContent = usingFallback ? triples.length : tc

    const dot = document.getElementById('statusDot')
    const label = document.getElementById('statusLabel')
    const lagEl = document.getElementById('indexerLag')

    if (usingFallback) {
      dot.className = 'dot lag'
      label.textContent = 'Cached on-chain data'
    } else if (ac > 0 || tc > 0) {
      dot.className = 'dot live'
      label.textContent = 'Live'
    } else {
      dot.className = 'dot lag'
      label.textContent = 'No data'
    }
    lagEl.style.display = 'inline'
    const latestAtomBlock = parseInt(globalInfo?.atoms?.[0]?.block_number) || 0
    if (usingFallback) {
      lagEl.textContent = latestAtomBlock > 0 ? `Indexer stuck at block ${latestAtomBlock.toLocaleString()} — showing ${atoms.length} atoms parsed directly from tx receipts` : 'Showing data parsed directly from on-chain transaction receipts'
    } else if (latestAtomBlock > 0) {
      const globalAtomCount = globalInfo?.atoms_aggregate?.aggregate?.count ?? 0
      const globalTripleCount = globalInfo?.triples_aggregate?.aggregate?.count ?? 0
      lagEl.textContent = `Indexer: block ${latestAtomBlock.toLocaleString()} (${globalAtomCount.toLocaleString()} atoms, ${globalTripleCount.toLocaleString()} triples globally)`
    }

    buildGraph()
    renderSide()

    if (graphReady) {
      for (let i = 0; i < 200; i++) simulate()
      draw()
    }
  } catch (e) {
    if (FALLBACK_DATA.atoms.length > 0) {
      usingFallback = true
      atoms = FALLBACK_DATA.atoms.map(a => ({ ...a, type: inferAtomType(a.label), emoji: inferAtomEmoji(a.label) }))
      triples = FALLBACK_DATA.triples
      document.getElementById('atomCount').textContent = atoms.length
      document.getElementById('tripleCount').textContent = triples.length
      document.getElementById('statusDot').className = 'dot lag'
      document.getElementById('statusLabel').textContent = 'GraphQL offline, using cached data'
      buildGraph()
      renderSide()
      for (let i = 0; i < 200; i++) simulate()
      draw()
    } else {
      document.getElementById('sideBody').innerHTML = `<div class="empty-state">${esc(e instanceof Error ? e.message : String(e))}</div>`
    }
  }
}

window.addEventListener('resize', () => { resizeCanvas(); if (graphReady) draw() })
document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return
  const q = this.value.trim()
  if (!q) return
  if (q.startsWith('0x') && q.length >= 10) { showDetail(q); return }
  const match = atoms.find(a => a.label.toLowerCase().includes(q.toLowerCase()))
  if (match) showDetail(match.term_id)
})

resizeCanvas()
load()
tick()
</script>
